name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: devpassword
      DB_NAME: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U app; do sleep 1; done

      - name: Create integration test database
        env:
          PGPASSWORD: devpassword
        run: |
          psql -h 127.0.0.1 -p 5432 -U app -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE app_test;"

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run test:integration
