# Copy to repository root as `.cursor-agent-workflow.yaml` and adjust commands/paths
# for your stack. See README in this folder for installation.

workflow:
  localOnly: true
  sourcePriority:
    - github-issue
    - direct-prompt
  successArtifact: github-pr

gates:
  requireApprovalAfterRequirements: false
  requireApprovalAfterDecomposition: false
  requireApprovalBeforePr: false
  allowNoGateMode: true

implementation:
  strategy: best-of-n
  candidateCount: 3
  maxRepairAttemptsPerCandidate: 2
  diversity:
    - minimal
    - test-first
    - robust-edge-cases

worktrees:
  root: "../.agent-worktrees"
  branchPrefix: "agent"
  cleanupRejected: false
  cleanupAfterPrMerge: true

verification:
  requireAllMustRequirementsCovered: false
  commands:
    lint: "cd backend && pnpm run lint"
    typecheck: "cd backend && pnpm exec tsc --noEmit -p tsconfig.build.json"
    unit: "cd backend && pnpm run test"
    integration: "cd backend && pnpm run test:e2e"
    build: "cd backend && pnpm run build"
    browser: "echo 'waived: REST API backend (no browser must-reqs)'"
  browser:
    enabled: false
    devServerCommand: "pnpm run start:dev"
    url: "http://localhost:3000"

security:
  requireReview: true
  blockOnHighSeverity: true
  dependencyAuditCommand: "cd backend && pnpm audit"

github:
  defaultBaseBranch: "main"
  draftPr: false
  linkIssue: true
  useGhCli: true

prMonitor:
  enabled: true
  intervalSeconds: 120
  maxDurationMinutes: 240
  autoFixClearFailures: true
  requireApprovalForBehaviorChanges: true

artifacts:
  root: ".agent-workflows"
  keepCommandLogs: true
  keepBrowserScreenshots: true
  keepRejectedCandidates: true
